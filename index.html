<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional WebAR Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        model-viewer {
            width: 100vw;
            height: 80vh;
            background-color: #f0f0f0;
        }
        .controls { padding: 20px; text-align: center; }
        #ar-button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="black_swan_nhmw-zoo-vs-63420.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        poster="poster.webp" 
        shadow-intensity="1" 
        auto-rotate>
        
        <button slot="ar-button" id="ar-button">
            👋 VIEW IN YOUR SPACE
        </button>

    </model-viewer>

    <div class="controls">
        <h2>Industrial Arm AR Project</h2>
        <p>Ensure you are on a mobile device with AR capabilities.</p>
    </div>

</body>
</html>
